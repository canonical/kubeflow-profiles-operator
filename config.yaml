options:
  port:
    type: int
    default: 8081
    description: HTTP port
  manager-port:
    type: int
    default: 8080
    description: Management port
  security-policy:
    type: string
    default: "privileged"
    description: >
      Specify the security policy to enforce in user workloads. The only two allowed values are `privileged` and `baseline`.

      This option changes the label that is added to all workloads in the profile's namespace. For more information, refer to: https://kubernetes.io/docs/concepts/security/pod-security-standards/
  istio-gateway-namespace:
    type: string
    default: "kubeflow"
    description: >
      The namespace where Istio Ingress Gateway is deployed.
  istio-gateway-service-account:
    type: string
    default: "istio-ingressgateway-workload-service-account"
    description: >
      The Service Account name of Istio Ingress Gateway.

      When integrating with Istio Ambient set to `istio-ingress-k8s-istio`.
  service-mesh-mode:
    type: string
    default: "istio-sidecar"
    description: >
      The service mesh mode to use. Can be `istio-sidecar` or `istio-ambient`
